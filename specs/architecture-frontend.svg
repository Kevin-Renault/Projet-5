<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 18px sans-serif; fill: #222; }
    .node { font: bold 14px sans-serif; fill: #222; }
    .small { font: 12px sans-serif; fill: #444; }
    .tiny { font: 11px sans-serif; fill: #666; }

    .rect { fill: #e3eaff; stroke: #4a90e2; stroke-width: 2; rx: 10; }
    .user { fill: #ffeaea; stroke: #e24a4a; stroke-width: 2; rx: 10; }
    .ext  { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; rx: 10; }
    .note { fill: #fffbe3; stroke: #e2b84a; stroke-width: 2; rx: 10; }

    .arrow { stroke: #222; stroke-width: 2; marker-end: url(#arrowhead); }
    .dash  { stroke: #555; stroke-width: 2; stroke-dasharray: 6,6; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="650" fill="#f7f7fa"/>

  <!-- Title -->
  <text x="30" y="40" class="title">Architecture Front-end (Angular)</text>
  <text x="30" y="62" class="tiny">Vue d’ensemble : UI + routing + couches core/services + échanges sécurisés avec l’API</text>

  <!-- User / Browser -->
  <rect x="40" y="110" width="140" height="60" class="user"/>
  <text x="110" y="138" text-anchor="middle" class="node">Utilisateur</text>
  <text x="110" y="158" text-anchor="middle" class="tiny">Navigateur (Chrome, etc.)</text>

  <!-- Angular SPA container -->
  <rect x="230" y="90" width="520" height="440" class="rect"/>
  <text x="490" y="120" text-anchor="middle" class="node">Application Angular (SPA)</text>
  <text x="490" y="142" text-anchor="middle" class="tiny">front/src/app (core • features • shared)</text>

  <!-- UI Layer -->
  <rect x="260" y="170" width="240" height="85" class="rect"/>
  <text x="380" y="198" text-anchor="middle" class="node">UI / Composants</text>
  <text x="380" y="220" text-anchor="middle" class="tiny">Templates + SCSS</text>
  <text x="380" y="240" text-anchor="middle" class="tiny">Shared (Header, Form, Error)</text>

  <!-- Routing / Guards -->
  <rect x="550" y="170" width="180" height="85" class="rect"/>
  <text x="640" y="198" text-anchor="middle" class="node">Routing</text>
  <text x="640" y="220" text-anchor="middle" class="tiny">Routes / navigation</text>
  <text x="640" y="240" text-anchor="middle" class="tiny">AuthGuard (pages privées)</text>

  <!-- Features -->
  <rect x="260" y="285" width="240" height="115" class="rect"/>
  <text x="380" y="314" text-anchor="middle" class="node">Features</text>
  <text x="380" y="336" text-anchor="middle" class="tiny">Home / User / Article / Topic</text>
  <text x="380" y="358" text-anchor="middle" class="tiny">Pages : login, register, profile</text>
  <text x="380" y="380" text-anchor="middle" class="tiny">Articles + commentaires, abonnements</text>

  <!-- Core services -->
  <rect x="550" y="285" width="180" height="115" class="rect"/>
  <text x="640" y="314" text-anchor="middle" class="node">Core</text>
  <text x="640" y="336" text-anchor="middle" class="tiny">AuthService + CSRF</text>
  <text x="640" y="358" text-anchor="middle" class="tiny">Interceptors : cookies, refresh</text>
  <text x="640" y="380" text-anchor="middle" class="tiny">Providers (data-sources)</text>

  <!-- Data access -->
  <rect x="260" y="430" width="480" height="80" class="rect"/>
  <text x="500" y="460" text-anchor="middle" class="node">Accès API (services)</text>
  <text x="500" y="482" text-anchor="middle" class="tiny">Implémentations real (HTTP) et mock (dev/tests) selon l’environnement</text>

  <!-- Environments -->
  <rect x="780" y="110" width="190" height="90" class="note"/>
  <text x="875" y="138" text-anchor="middle" class="node">Environnements</text>
  <text x="875" y="160" text-anchor="middle" class="tiny">environment.ts / dev / prod</text>
  <text x="875" y="180" text-anchor="middle" class="tiny">useMock + routes de dev</text>

  <!-- Backend API -->
  <rect x="790" y="290" width="180" height="95" class="ext"/>
  <text x="880" y="318" text-anchor="middle" class="node">API REST</text>
  <text x="880" y="340" text-anchor="middle" class="tiny">Spring Boot</text>
  <text x="880" y="362" text-anchor="middle" class="tiny">/api/* + cookies JWT</text>

  <!-- Legend -->
  <rect x="40" y="550" width="930" height="90" class="note"/>
  <text x="60" y="580" class="node">Légende</text>
  <text x="60" y="605" class="small">• Les pages privées sont protégées par un guard. Les appels API passent par HttpClient + interceptors (cookies/refresh) et incluent la protection CSRF.</text>
  <text x="60" y="625" class="small">• Le mode mock peut être activé via l’environnement pour faciliter le dev/tests locaux sans toucher l’API.</text>

  <!-- Arrows -->
  <line x1="180" y1="140" x2="230" y2="140" class="arrow"/>
  <text x="205" y="130" text-anchor="middle" class="tiny">UI</text>

  <line x1="380" y1="255" x2="380" y2="285" class="arrow"/>
  <text x="395" y="280" class="tiny">navigation / pages</text>

  <line x1="500" y1="212" x2="550" y2="212" class="arrow"/>
  <text x="525" y="202" text-anchor="middle" class="tiny">routes</text>

  <line x1="500" y1="343" x2="550" y2="343" class="arrow"/>
  <text x="525" y="333" text-anchor="middle" class="tiny">core</text>

  <line x1="640" y1="400" x2="640" y2="430" class="arrow"/>
  <text x="655" y="427" class="tiny">services</text>

  <polyline points="740,470 770,470 770,338 790,338" fill="none" class="arrow"/>
  <text x="752" y="460" class="tiny">HTTP(S) + cookies</text>

  <line x1="780" y1="155" x2="750" y2="155" class="dash"/>
  <text x="765" y="145" text-anchor="middle" class="tiny">configure</text>
</svg>

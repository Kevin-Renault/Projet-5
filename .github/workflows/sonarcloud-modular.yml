name: SonarCloud Modular

on:
  push:
    branches:
      - '**'
    paths:
      - 'back/**'
      - 'front/**'
      - '.github/workflows/sonarcloud-modular.yml'
  pull_request:
    paths:
      - 'back/**'
      - 'front/**'
      - '.github/workflows/sonarcloud-modular.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: mdd
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Make Maven wrapper executable
        working-directory: back
        run: chmod +x mvnw

  build-test-backend:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Build and test (backend)
        working-directory: back
        env:
          DB_MDD_NAME: mdd
          DB_USER: root
          DB_PASSWORD: root
        run: ./mvnw -B verify
      - name: Coverage summary (JaCoCo)
        working-directory: back
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path
          report_path = Path('target/site/jacoco/jacoco.xml')
          # ...existing code for JaCoCo summary...
          PY

  build-test-frontend:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Install dependencies (frontend)
        working-directory: front
        run: npm ci
      - name: Run unit tests (Jest)
        working-directory: front
        run: npm run test:unit:ci
      - name: Unit coverage summary (Jest)
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          # ...existing code for Jest summary...
          PY

  cypress:
    runs-on: ubuntu-latest
    needs: [build-test-backend, build-test-frontend]
    steps:
      - name: Start backend (for Cypress)
        shell: bash
        env:
          DB_MDD_NAME: mdd
          DB_USER: root
          DB_PASSWORD: root
        run: |
          set -euo pipefail
          java -version
          nohup java -jar back/target/mdd-api-0.0.1-SNAPSHOT.jar > back.log 2>&1 &
          echo "Waiting for backend to be ready..."
          for i in {1..60}; do
            if curl -fsS "http://localhost:8080/api/auth/csrf" >/dev/null; then
              echo "Backend is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time."
          tail -n 200 back.log || true
          exit 1
      - name: Start frontend (Angular)
        working-directory: front
        run: npm run start -- --port 4200 &
      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:4200" >/dev/null; then
              echo "Frontend is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time."
          exit 1
      - name: Check backend environment (dev)
        id: check_backend_env
        run: |
          ENV=$(curl -s http://localhost:8080/api/env | grep -o '"dev"')
          if [ -z "$ENV" ]; then
            echo "::set-output name=should_run_cypress::false"
            echo "Backend is NOT in dev mode, skipping Cypress tests."
          else
            echo "::set-output name=should_run_cypress::true"
          fi
      - name: Run Cypress E2E (JUnit)
        if: steps.check_backend_env.outputs.should_run_cypress == 'true'
        working-directory: front
        env:
          CYPRESS_CACHE_FOLDER: ~/.cache/Cypress
        run: npm run cypress:run
      - name: E2E summary (Cypress)
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          import glob
          import xml.etree.ElementTree as ET
          from pathlib import Path
          # ...existing code for Cypress summary...
          PY

  cleanup:
    runs-on: ubuntu-latest
    needs: cypress
    steps:
      - name: Cleanup test users (only if backend is dev)
        run: |
          ENV=$(curl -s http://localhost:8080/api/env | grep -o '"dev"')
          if [ -z "$ENV" ]; then
            echo "Backend is NOT in dev mode, skipping cleanup."
          else
            mysql -h 127.0.0.1 -P 3306 -u root -proot mdd -e "DELETE FROM users WHERE username LIKE 'it_to_erase_%';"
          fi

  report:
    runs-on: ubuntu-latest
    needs: [build-test-backend, build-test-frontend, cypress]
    steps:
      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: back/target/site/jacoco
          if-no-files-found: error
          retention-days: 14
      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-report
          path: |
            front/coverage
            front/jest-results.json
          if-no-files-found: warn
          retention-days: 14
      - name: Upload Cypress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: |
            front/cypress/results
            front/cypress/screenshots
            front/cypress/videos
            front/coverage-e2e
            front/.nyc_output
          if-no-files-found: warn
          retention-days: 14
      - name: Add artifact download link
        if: always()
        shell: bash
        run: |
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Downloads" >> "${GITHUB_STEP_SUMMARY}"
          echo "- JaCoCo artifact (this run): ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${{ steps.upload_jacoco_report.outputs.artifact-id }}" >> "${GITHUB_STEP_SUMMARY}"
          if [ -n "${{ steps.upload_jest_report.outputs.artifact-id }}" ]; then
            echo "- Jest artifact (this run): ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${{ steps.upload_jest_report.outputs.artifact-id }}" >> "${GITHUB_STEP_SUMMARY}"
          fi
          if [ -n "${{ steps.upload_cypress_report.outputs.artifact-id }}" ]; then
            echo "- Cypress artifact (this run): ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${{ steps.upload_cypress_report.outputs.artifact-id }}" >> "${GITHUB_STEP_SUMMARY}"
          fi

  close:
    runs-on: ubuntu-latest
    needs: [report, cleanup]
    steps:
      - name: CI finished
        run: echo "CI pipeline completed."
